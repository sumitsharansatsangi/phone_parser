name: phone_parser
description: Dart library for parsing phone numbers with auto synced with Google libphonenumber. Inspired by Google's libphonenumber and PhoneNumberKit for ios.
version: 0.0.9
homepage: https://github.com/sumitsharansatsangi/phone_parser

topics:
  - phone
  - parser
  - libphonenumber
  - google
  - apple
  - phone-number-verification


environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  meta: ^1.17.0
  xml: ^7.0.1

dev_dependencies:
  lints: ^6.1.0
  test: ^1.26.3
